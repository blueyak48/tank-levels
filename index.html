<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tanks">
    <title>Poole Ag Tank View</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="title-wrapper">
            <img src="logo.png" alt="Poole Ag Logo" class="title-logo">
            <div class="title-container">
                <h1>Tank Levels</h1>
                <div class="last-updated" id="last-updated">Updating...</div>
            </div>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button class="btn-icon" id="refresh-btn" aria-label="Refresh">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
            </button>
            <button class="btn-icon" id="settings-btn" aria-label="Settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </header>

    <main>
        <div id="pull-indicator" class="pull-to-refresh">Pull down to refresh...</div>
        
        <div id="loader" class="loader" style="display: none;"></div>
        
        <div id="tank-container" class="tank-container">
            <!-- Tanks injected by JS -->
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>App Settings</h2>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1.5rem;">
                Please enter the secure password to decrypt the local telemetry keys.
            </p>
            <div class="input-group">
                <label for="api-key-input">App Password</label>
                <input type="password" id="api-key-input" placeholder="Enter password (e.g. texline)">
            </div>
            
            <div class="input-group" style="margin-top: 1.5rem;">
                <label>Location Sorter Priority</label>
                <div id="location-sorter" class="sorter-list">
                    <!-- Injected dynamically via JS -->
                </div>
            </div>

            <button id="save-settings-btn" class="btn-primary">Save Settings</button>
            <button id="logout-btn" class="btn-primary" style="margin-top: 1rem; background: var(--status-critical); display: none;">Logout</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
